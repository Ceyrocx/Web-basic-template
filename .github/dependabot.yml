version: 2
updates:
  # 1) GitHub Actions used in .github/workflows/
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  # 2) Backend Python deps (pyproject.toml + uv.lock)
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
    groups:
      python-minor:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # 3) Base images in the Dockerfiles (python, uv, bun, nginx)
  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: weekly
