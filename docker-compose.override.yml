# Auto-merged by `docker compose up` → switches everything to dev mode
services:
  backend:
    volumes:
      - ./backend:/app        # mount the source for live editing
      - /app/.venv            # keep the image's venv (don't let the mount hide it)
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      target: build
    command: bun run dev --host
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports: !override
      - "5173:5173"
    healthcheck:
      disable: true          # dev runs Vite on 5173, not nginx on 80 → skip this check
